version: "3.8"

services:
  # ── Neo4j 知识图谱 ──────────────────────────
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/your_password_here
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "your_password_here", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 后端 FastAPI ────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: your_password_here
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
    volumes:
      - knowledge_data:/app/knowledge
      - chroma_data:/app/chroma_db
    depends_on:
      neo4j:
        condition: service_healthy

  # ── 前端 Next.js ────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  neo4j_data:
  knowledge_data:
  chroma_data:
